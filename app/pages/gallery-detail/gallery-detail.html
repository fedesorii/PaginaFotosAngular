<div id="gallery-detail">
  @if (info()) {
    <h1>{{ info()?.title }}</h1>

    @if (photos().length > 0) {
      <div class="grid-photos">
        @for (photo of photos(); track $index) {
          <div class="photo-item">
            <img [src]="photo" alt="Fotografía del evento" />
          </div>
        }
      </div>
    } @else {
      <p>Cargando fotografías de alta calidad...</p>
    }
  } @else {
    <h2>Lo siento, esta galería no existe.</h2>
  }
</div>
